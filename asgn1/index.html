<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ASGN1 Paint Program - Ranvir Sandhu</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;
      color: #1f2937;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0 0 16px 0;
      font-size: 28px;
    }

    .layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    #webgl {
      border: 2px solid #111827;
      background: #000;
    }

    .panel {
      width: 340px;
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .section {
      margin-bottom: 16px;
    }

    .section h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button.secondary {
      background: #475569;
    }

    button.active {
      background: #16a34a;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
    }

    input[type="range"] {
      width: 100%;
    }

    .value {
      font-weight: 700;
    }

    .note {
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 12px;
      line-height: 1.45;
      font-size: 14px;
    }

    .ref img {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      display: block;
    }

    .small {
      font-size: 13px;
      color: #475569;
      margin-top: 8px;
    }
  </style>
</head>
<body onload="main()">
  <div class="page">
    <h1>ASGN1 Paint Program - Ranvir Sandhu</h1>
    <div class="layout">
      <canvas id="webgl" width="700" height="700"></canvas>

      <div class="panel">
        <div class="section">
          <h2>Brush</h2>
          <div class="row">
            <button id="pointButton">Point</button>
            <button id="triangleButton" class="secondary">Triangle</button>
            <button id="circleButton" class="secondary">Circle</button>
          </div>
        </div>

        <div class="section">
          <h2>Actions</h2>
          <div class="row">
            <button id="clearButton" class="secondary">Clear Canvas</button>
            <button id="pictureButton">Draw Picture</button>
            <button id="mirrorButton" class="secondary">Mirror Mode Off</button>
          </div>
        </div>

        <div class="section">
          <label for="redSlide">Red: <span id="redValue" class="value">100</span></label>
          <input id="redSlide" type="range" min="0" max="100" value="100">
        </div>

        <div class="section">
          <label for="greenSlide">Green: <span id="greenValue" class="value">100</span></label>
          <input id="greenSlide" type="range" min="0" max="100" value="100">
        </div>

        <div class="section">
          <label for="blueSlide">Blue: <span id="blueValue" class="value">100</span></label>
          <input id="blueSlide" type="range" min="0" max="100" value="100">
        </div>

        <div class="section">
          <label for="sizeSlide">Size: <span id="sizeValue" class="value">12</span></label>
          <input id="sizeSlide" type="range" min="5" max="40" value="12">
        </div>

        <div class="section">
          <label for="segmentSlide">Circle Segments: <span id="segmentValue" class="value">18</span></label>
          <input id="segmentSlide" type="range" min="3" max="40" value="18">
        </div>

        <div class="section">
          <h2>Awesomeness</h2>
          <div class="note">
            Smooth stroke interpolation while dragging so there are fewer gaps, and it also has mirror mode so one stroke paints on both sides at the same time.
          </div>
        </div>

        <div class="section ref">
          <h2>Reference Picture</h2>
          <img src="fish.jpg" alt="Reference sketch">
          <div class="small"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="Point.js"></script>
  <script src="Triangle.js"></script>
  <script src="Circle.js"></script>
  <script src="asgn1.js"></script>
</body>
</html>
